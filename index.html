<style>
<a href="https://wa.me/66811520624" target="_blank" style="

body{

/* HERO */
.hero{

  height:450px;
  position:relative;
  overflow:hidden;
}

.section{
  width:100%;
  max-width:600px;
  margin:30px auto;
  position:relative;
  height:350px;
  overflow:hidden;
  border-radius:15px;
}

/* IMAGES */
.hero img,
.section img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transition:1s;
}

/* TEXT OVERLAY */
.overlay{
  position:absolute;
  bottom:0;
  width:100%;
  background:rgba(0,0,0,0.5);
  color:white;
  padding:15px;
  text-align:center;
}

.overlay h2{
  margin:0;
  font-size:20px;
}

.overlay p{
  margin:5px 0 0;
  font-size:14px;
}
</style>
</head>

<body>

<!-- HERO -->

<script>
// SLIDER<div style="max-width:600px; margin:40px auto;">

  <iframe 
    src="https://www.google.com/maps?q=Sawaddee+Holland+Rayong&output=embed"
    width="100%"

    style="border:0;">
  </iframe>

  <br><br>

  <a href="https://www.google.com/maps/dir/?api=1&destination=Sawaddee+Holland+Rayong" 
     target="_blank"
     style="
     display:block;
     text-align:center;
     background:#0f4c5c;
     color:white;
     padding:12px;
     border-radius:10px;
     text-decoration:none;
     ">
    Open Route
  </a>

</div>
function slider(cls){
  let slides = document.querySelectorAll("." + cls);
  let i = 0;

  if(slides.length === 0) return;

  slides[0].style.opacity = "1";

  setInterval(()=>{
    slides[i].style.opacity = "0";
    i = (i + 1) % slides.length;
    slides[i].style.opacity = "1";
  },3000);
}

// START
slider("hero-slide");
slider("room1");
slider("room2");
slider("bar");
slider("garden");
</script>

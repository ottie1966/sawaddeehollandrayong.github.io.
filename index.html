/* HERO */
.hero{

  height:450px;
  overflow:hidden;
}

.hero img{
  position:absolute;
  width:100%;
  height:100%;

}

.hero img.active{

}

.overlay{

  padding:20px;

  margin:30px auto;
  position:relative;
  height:300px;
  overflow:hidden;
  border-radius:15px;
}

.section img{
  position:absolute;
  width:100%;
  height:100%;

  opacity:0;

}

.section img.active{

/* TEXT */

  width:100%;

  color:white;
  text-align:center;

<script>
function slider(className){
  let slides = document.querySelectorAll("." + className);
  let i = 0;

  setInterval(()=>{
    slides[i].classList.remove("active");
    i = (i + 1) % slides.length;
    slides[i].classList.add("active");
  },3000);
}

// START

slider("room1");
slider("room2");
slider("bar");
slider("garden");
</script>
